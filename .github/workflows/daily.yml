name: Daily Data Update

on:
  schedule:
    # EDT (UTC-4): fires ~90min before the 21:30 UTC (17:30 ET) sleep target,
    # to absorb GitHub Actions cron jitter (observed 60-70min delays on this repo).
    - cron: '0 20 * * 1-5'
    # EST (UTC-5): fires ~90min before the 22:30 UTC (17:30 ET) sleep target.
    - cron: '0 21 * * 1-5'
  workflow_dispatch:  # allow manual run

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Sleep until 17:30 ET
        run: |
          TARGET=$(TZ=America/New_York date -d 'today 17:30:00' +%s)
          NOW=$(date +%s)
          SLEEP=$((TARGET - NOW))
          if [ "$SLEEP" -gt 0 ]; then
            echo "Sleeping ${SLEEP}s until 17:30 ET..."
            sleep "$SLEEP"
          fi

      - name: Run pipeline
        run: python pipeline/compute.py

      - name: Copy data for site build
        run: |
          mkdir -p site/public/data
          cp data/signals.json site/public/data/signals.json
          if [ -f data/preview.json ]; then cp data/preview.json site/public/data/preview.json; fi

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ site/public/data/
          git diff --staged --quiet || git commit -m "chore: daily data update $(date -u +%Y-%m-%d)"
          git pull --rebase --autostash origin main
          git push

      - name: Trigger deploy
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            });

      - name: Notify on state change
        if: always()
        uses: actions/github-script@v7
        env:
          SIGNALS_PATH: data/signals.json
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync(process.env.SIGNALS_PATH, 'utf8'));
            const state = data.state.machine;
            const since = data.state.since;
            const last = data.last_session;

            // Notify when state is MONITOR or EXIT (renamed from ARMED/FIRED in v3.1)
            if (state === 'MONITOR' || state === 'EXIT') {
              const emoji = state === 'MONITOR' ? '⚠️' : '🔴';
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `${emoji} SOXX regime: ${state} (${last})`,
                body: `State: **${state}** since ${since}\n\nLast session: ${last}\n\nView dashboard: https://jgiancristofaro.github.io/soxx-regime-monitor/`,
                labels: ['regime-alert'],
              });
            }
