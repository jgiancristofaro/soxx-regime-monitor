name: Preview Run (3:40pm ET)

on:
  schedule:
    # EDT (UTC-4): fires ~98min before the 19:38 UTC (15:38 ET) sleep target,
    # to absorb GitHub Actions cron jitter (observed 60-70min delays on this repo).
    - cron: '0 18 * * 1-5'
    # EST (UTC-5): fires ~98min before the 20:38 UTC (15:38 ET) sleep target.
    - cron: '0 19 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Sleep until 15:38 ET
        run: |
          TARGET=$(TZ=America/New_York date -d 'today 15:38:00' +%s)
          NOW=$(date +%s)
          SLEEP=$((TARGET - NOW))
          if [ "$SLEEP" -gt 0 ]; then
            echo "Sleeping ${SLEEP}s until 15:38 ET..."
            sleep "$SLEEP"
          fi

      - name: Run preview pipeline
        id: preview
        run: |
          set +e
          OUTPUT=$(python pipeline/preview.py 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          # The two cron triggers above always both fire every weekday (GitHub cron
          # doesn't shift for DST), so whichever one isn't tuned for the current
          # season regularly starts late enough to land past preview.py's hard
          # ABORT_CUTOFF (15:59 ET). That abort is intentional/safe — no file is
          # written — so treat it as a no-op instead of a failure. Any other
          # non-zero exit (a real bug) still fails the job normally.
          if [ "$STATUS" -ne 0 ] && echo "$OUTPUT" | grep -q "^Preview aborted: past"; then
            echo "Redundant DST-buffer cron fired after the abort cutoff — expected no-op, not a failure."
            echo "aborted=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "aborted=false" >> "$GITHUB_OUTPUT"
          exit "$STATUS"

      - name: Commit preview snapshot
        if: steps.preview.outputs.aborted != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/preview.json
          git diff --staged --quiet || git commit -m "chore: preview snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase --autostash origin main
          git push

      - name: Trigger deploy
        if: steps.preview.outputs.aborted != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            });
