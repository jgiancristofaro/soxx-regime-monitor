name: Preview Run (3:40pm ET)

on:
  schedule:
    # EDT (UTC-4): fires ~98min before the 19:38 UTC (15:38 ET) sleep target,
    # to absorb GitHub Actions cron jitter (observed 60-70min delays on this repo).
    - cron: '0 18 * * 1-5'
    # EST (UTC-5): fires ~98min before the 20:38 UTC (15:38 ET) sleep target.
    - cron: '0 19 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Sleep until 15:38 ET
        run: |
          TARGET=$(TZ=America/New_York date -d 'today 15:38:00' +%s)
          NOW=$(date +%s)
          SLEEP=$((TARGET - NOW))
          if [ "$SLEEP" -gt 0 ]; then
            echo "Sleeping ${SLEEP}s until 15:38 ET..."
            sleep "$SLEEP"
          fi

      - name: Run preview pipeline
        run: python pipeline/preview.py

      - name: Commit preview snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/preview.json
          git diff --staged --quiet || git commit -m "chore: preview snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase --autostash origin main
          git push

      - name: Trigger deploy
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            });
